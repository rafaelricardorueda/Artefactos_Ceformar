<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Control - Corporación Educativa Formar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #0284c7;
            --primary-light: #e0f2fe;
            --success: #10b981;
            --border-color: #cbd5e1;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 30px 20px; }
        
        header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 25px 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }

        .header-container {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
        }

        .header-logo {
            max-height: 80px;
            width: auto;
            border-radius: 6px;
            background: white;
            padding: 2px;
            object-fit: contain;
        }

        .header-text h1 { font-size: 1.5rem; color: #38bdf8; font-weight: 700; }
        .header-text h2 { font-size: 1.2rem; color: #ffffff; font-weight: 600; }

        .calc-container { max-width: 900px; margin: 0 auto; background: var(--bg-card); padding: 30px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border-color); }
        
        .input-box { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 1.1rem; resize: none; background: #f8fafc; color: #0f172a; }
        
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; }

        .results-section { margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .stat-card { background: #f8fafc; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border-color); }
        .stat-card span { display: block; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .stat-card strong { font-size: 1.4rem; color: var(--primary); display: block; margin-top: 4px; }

        .diagnostic-box { margin-top: 25px; background: var(--primary-light); padding: 20px; border-radius: 10px; border-left: 5px solid var(--primary); }
        .diagnostic-box h3 { font-size: 1rem; color: var(--primary); margin-bottom: 5px; }
        
        .chart-section { margin-top: 30px; }
        .chart-section h3 { font-size: 1.1rem; margin-bottom: 15px; }
        .chart-bar-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .chart-label { width: 80px; font-size: 0.8rem; color: var(--text-muted); }
        .chart-bar-container { flex-grow: 1; background: #e2e8f0; height: 22px; border-radius: 4px; overflow: hidden; }
        .chart-bar-fill { background: var(--success); height: 100%; width: 0%; transition: width 0.4s ease-out; }
        .chart-bar-value { width: 40px; text-align: right; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>

    <div style="max-width: 900px; margin: 0 auto;">
        <header>
            <div class="header-container">
                <img class="header-logo" src="Logo Formar.jpg" alt="Logo Corporación Educativa Formar">
                <div class="header-text">
                    <h1>Corporación Educativa Formar</h1>
                    <h2>Control de Compras y Aprovisionamiento</h2>
                </div>
            </div>
        </header>

        <div class="calc-container">
            <div class="input-box">
                <label for="data-input">Introduce los valores observados en auditoría separados por comas:</label>
                <textarea id="data-input" rows="3">12, 18, 15, 22, 15, 30, 25</textarea>
            </div>
            <button onclick="procesarCalculos()">Calcular Variables Operativas</button>

            <div class="results-section">
                <div class="stat-card"><span>Media (x̄)</span><strong id="res-media">-</strong></div>
                <div class="stat-card"><span>Mediana</span><strong id="res-mediana">-</strong></div>
                <div class="stat-card"><span>Moda</span><strong id="res-moda">-</strong></div>
                <div class="stat-card"><span>Rango</span><strong id="res-rango">-</strong></div>
                <div class="stat-card"><span>Desviación</span><strong id="res-desviacion">-</strong></div>
                <div class="stat-card"><span>Estabilidad (CV)</span><strong id="res-cv">-</strong></div>
            </div>

            <div class="diagnostic-box">
                <h3>📢 Diagnóstico Automatizado de Estabilidad:</h3>
                <p id="interpretacion-texto">Introduce un set de datos para evaluar las métricas de la bodega.</p>
            </div>

            <div class="chart-section">
                <h3>📊 Histograma de Distribución Interna</h3>
                <div id="chart-wrapper"></div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() { procesarCalculos(); };

        function procesarCalculos() {
            const text = document.getElementById('data-input').value;
            const datos = text.split(',').map(v => parseFloat(v.trim())).filter(v => !isNaN(v));

            if (datos.length < 2) {
                alert("Por favor, ingresa un mínimo de 2 números válidos.");
                return;
            }

            const n = datos.length;
            const suma = datos.reduce((a, b) => a + b, 0);
            const media = suma / n;

            const ordenados = [...datos].sort((a, b) => a - b);
            let mediana = n % 2 !== 0 ? ordenados[Math.floor(n / 2)] : (ordenados[(n / 2) - 1] + ordenados[n / 2]) / 2;

            const frec = {}; datos.forEach(v => frec[v] = (frec[v] || 0) + 1);
            let maxFrec = 0; let modas = [];
            for (let k in frec) {
                if (frec[k] > maxFrec) { maxFrec = frec[k]; modas = [k]; }
                else if (frec[k] === maxFrec) { modas.push(k); }
            }
            let stringModa = (modas.length === Object.keys(frec).length) ? "Ninguna" : modas.join(', ');

            const rango = ordenados[ordenados.length - 1] - ordenados[0];
            const varianza = datos.reduce((a, b) => a + Math.pow(b - media, 2), 0) / n;
            const desviacion = Math.sqrt(varianza);
            const cv = media !== 0 ? (desviacion / media) * 100 : 0;

            document.getElementById('res-media').innerText = media.toFixed(1);
            document.getElementById('res-mediana').innerText = mediana.toFixed(1);
            document.getElementById('res-moda').innerText = stringModa;
            document.getElementById('res-rango').innerText = rango.toFixed(1);
            document.getElementById('res-desviacion').innerText = desviacion.toFixed(1);
            document.getElementById('res-cv').innerText = cv.toFixed(1) + "%";

            let diag = "";
            if(cv <= 15) diag = `Proceso ESTABLE (${cv.toFixed(1)}%). Flujos consistentes y controlados. Poca dispersión física en el almacén.`;
            else if(cv <= 30) diag = `Variabilidad MODERADA (${cv.toFixed(1)}%). Comportamiento estándar con variaciones lógicas de operación diaria.`;
            else diag = `¡ALTA INESTABILIDAD! (${cv.toFixed(1)}%). Datos muy dispersos. Se recomienda basar proyecciones en la Mediana y buscar cuellos de botella.`;
            document.getElementById('interpretacion-texto').innerText = diag;

            const wrapper = document.getElementById('chart-wrapper');
            wrapper.innerHTML = "";
            const maxVal = Math.max(...datos, 1);
            datos.forEach((valor, i) => {
                const ancho = (valor / maxVal) * 100;
                const fila = document.createElement('div');
                fila.className = 'chart-bar-row';
                fila.innerHTML = `
                    <div class="chart-label">Muestra ${i + 1}</div>
                    <div class="chart-bar-container"><div class="chart-bar-fill" style="width: ${ancho}%"></div></div>
                    <div class="chart-bar-value">${valor}</div>
                `;
                wrapper.appendChild(fila);
            });
        }
    </script>
</body>
</html>
